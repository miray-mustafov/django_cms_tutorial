<h1>{{ instance.question }}</h1>

<form action="{% url 'cms_polls:vote' instance.id %}" method="post">
    {% csrf_token %}
    <div class="form-group">
        {% for choice in instance.choice_set.all %}
            <div class="radio">
                <label>
                    <input type="radio" name="choice" value="{{ choice.id }}">
                    {{ choice.choice_text }}
                </label>
            </div>
        {% endfor %}
    </div>
    <input type="submit" value="Vote"/>
</form>
